services:
  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build: .
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATA_DIR: /data/query-engine
    volumes:
      - ~/query-engine-data:/data/query-engine  # for local filesystem testing
    depends_on:
      - redis
      - neo4j

  beat:
    build: .
    command: celery -A app.worker.celery_app:celery_app beat --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  neo4j_data:
  redis_data:
