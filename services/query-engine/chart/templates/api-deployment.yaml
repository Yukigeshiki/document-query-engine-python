apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-engine-api
  labels:
    app: query-engine-api
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: query-engine-api
  template:
    metadata:
      labels:
        app: query-engine-api
    spec:
      initContainers:
        - name: wait-for-neo4j
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z neo4j.query-engine.svc.cluster.local 7687; do echo "Waiting for Neo4j..."; sleep 2; done']
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z postgres.query-engine.svc.cluster.local 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z redis.query-engine.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done']
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          envFrom:
            - configMapRef:
                name: {{ .Values.config.configMapName }}
            - secretRef:
                name: {{ .Values.config.secretName }}
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.api.resources.requests.cpu }}
              memory: {{ .Values.api.resources.requests.memory }}
            limits:
              cpu: {{ .Values.api.resources.limits.cpu }}
              memory: {{ .Values.api.resources.limits.memory }}
