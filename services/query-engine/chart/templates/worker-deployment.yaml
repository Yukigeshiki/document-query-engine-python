apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-engine-worker
  labels:
    app: query-engine-worker
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: query-engine-worker
  template:
    metadata:
      labels:
        app: query-engine-worker
    spec:
      initContainers:
        - name: wait-for-neo4j
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z neo4j.query-engine.svc.cluster.local 7687; do echo "Waiting for Neo4j..."; sleep 2; done']
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z postgres.query-engine.svc.cluster.local 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z redis.query-engine.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done']
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "app.worker.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=1"]
          envFrom:
            - configMapRef:
                name: {{ .Values.config.configMapName }}
            - secretRef:
                name: {{ .Values.config.secretName }}
          resources:
            requests:
              cpu: {{ .Values.worker.resources.requests.cpu }}
              memory: {{ .Values.worker.resources.requests.memory }}
            limits:
              cpu: {{ .Values.worker.resources.limits.cpu }}
              memory: {{ .Values.worker.resources.limits.memory }}
